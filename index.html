

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Announcement Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📢 Announcement Board</h1>
        <p class="subtitle">Share your message with everyone</p>

        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Enter your announcement...">
            <button onclick="postAnnouncement()">Post</button>
        </div>

        <div class="output">
            <h2>Latest Announcement:</h2>
            <p id="outputBox">No announcement yet.</p>
        </div>
    </div>

    <script src="kevin.js   "></script>
</body>
</html>
